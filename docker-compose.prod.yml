version: '3.8'

services:
  postgres:
    extends:
      file: docker-compose.yml
      service: postgres
    restart: always

  redis:
    extends:
      file: docker-compose.yml
      service: redis
    restart: always

  backend:
    extends:
      file: docker-compose.yml
      service: backend
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # Дополнительные production настройки

  frontend:
    extends:
      file: docker-compose.yml
      service: frontend
    restart: always

  # Добавляем nginx как reverse proxy для production
  nginx:
    image: nginx:alpine
    container_name: calculator-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - backend
      - frontend
    networks:
      - calculator-network

networks:
  calculator-network:
    driver: bridge