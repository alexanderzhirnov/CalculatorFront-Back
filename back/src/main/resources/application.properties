spring.application.name=back
server.port=${SERVER_PORT:8081}

# ===== PostgreSQL =====
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/calculator_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===== Flyway =====
spring.flyway.enabled=true
spring.flyway.locations=classpath:migration
spring.flyway.baseline-on-migrate=true

# ===== JWT =====
app.jwt.secret=${APP_JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
app.jwt.access-token-expiration=${APP_JWT_ACCESS_TOKEN_EXPIRATION:3600000}
app.jwt.refresh-token-expiration=${APP_JWT_REFRESH_TOKEN_EXPIRATION:604800000}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173,http://localhost,http://127.0.0.1}
app.support.telegram-bot-token=${APP_SUPPORT_TELEGRAM_BOT_TOKEN:}
app.support.telegram-chat-id=${APP_SUPPORT_TELEGRAM_CHAT_ID:}

# ===== Mail =====
spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:1025}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS:false}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
app.auth.public-base-url=${APP_PUBLIC_BASE_URL:http://127.0.0.1:3000}
app.auth.mail-from=${APP_AUTH_MAIL_FROM:no-reply@stroyraschet.local}
app.auth.email-verification-ttl-hours=${APP_AUTH_EMAIL_VERIFICATION_TTL_HOURS:24}
app.auth.password-reset-ttl-minutes=${APP_AUTH_PASSWORD_RESET_TTL_MINUTES:30}

# ===== Swagger =====
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ===== Scheduler =====
spring.task.scheduling.pool.size=5
